<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="100%" height="100%">
  <defs>
    <!-- Gradients for a modern, tech feel -->
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo -->
      <stop offset="100%" stop-color="#06B6D4" /> <!-- Cyan -->
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#10B981" /> <!-- Emerald -->
    </linearGradient>
  </defs>

  <!-- LOGO MARK (Interlocking C and K) -->
  <g transform="translate(10, 10)">
    <!-- The 'C' Element -->
    <path d="M 50 10 
             A 40 40 0 1 0 50 90 
             L 55 90 
             A 10 10 0 0 0 65 80 
             A 20 20 0 1 1 50 30 
             L 55 30 
             A 10 10 0 0 0 50 10 Z" 
          fill="url(#brandGradient)" />
    
    <!-- The 'K' Element (Intersecting Right Side) -->
    <path d="M 60 20 
             A 10 10 0 0 0 50 30 
             L 50 70 
             A 10 10 0 0 0 65 78
             L 80 55 
             L 95 80 
             A 10 10 0 0 0 112 70
             L 92 45 
             L 108 25 
             A 10 10 0 0 0 92 15
             L 73 38 Z" 
          fill="url(#accentGradient)" />
  </g>

  <!-- TYPOGRAPHY -->
  <!-- "Centaas" - Bold and Prominent -->
  <text x="140" y="70" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="42" 
        font-weight="800" 
        fill="#1F2937">Centaas</text>

  <!-- "Kentola" - Slim/Light contrast -->
  <text x="315" y="70" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="42" 
        font-weight="300" 
        fill="#4B5563">Kentola</text>

  <!-- Optional Subtitle/Tagline -->
  <text x="142" y="92" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="14" 
        font-weight="500" 
        letter-spacing="3" 
        fill="#9CA3AF">DIGITAL PLATFORM</text>
</svg>
